name: chain_pop
description: "A minimalist logic puzzle extraction game."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.37.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  haptic_feedback: ^0.5.1
  google_fonts: ^8.0.2
  audioplayers: ^6.6.0
  google_mobile_ads: ^8.0.0
  # Mocked logic for later integrations
  # applovin_max: ^...
  # firebase_remote_config: ^...
  # gameanalytics: ^...

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
