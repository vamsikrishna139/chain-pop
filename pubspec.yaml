name: chain_pop
description: "A minimalist logic puzzle extraction game."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.37.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  haptic_feedback: ^0.5.1
  google_fonts: ^8.0.2
  audioplayers: ^6.6.0
  google_mobile_ads: ^8.0.0
  firebase_core: ^4.9.0
  firebase_crashlytics: ^5.2.2
  firebase_analytics: ^12.4.1
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.2
  # Mocked logic for later integrations
  # applovin_max: ^...
  # firebase_remote_config: ^...
  # gameanalytics: ^...

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#0F0F13"
  adaptive_icon_foreground: assets/branding/app_icon.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/branding/
